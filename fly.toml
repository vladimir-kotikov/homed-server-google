app = 'homed-server-google'
primary_region = 'cdg'

[env]
  DATABASE_URL = '/data/user.db'
  GOOGLE_APPLICATION_CREDENTIALS = '/tmp/gcloud/key.json'
  DEBUG = 'homed:*,-homed:*:debug'
  DEBUG_HIDE_DATE = "1"
  NODE_ENV = 'production'
  # These will be used to ignore and close early the healtcheck connections
  # from fly.io, which are not expected to do anything and just consume resources
  HEALTHCHECK_IPS = '::ffff:172.19.14.153'

[[files]]
  secret_name = 'GOOGLE_APPLICATION_CREDENTIALS_JSON'
  guest_path = '/tmp/gcloud/key.json'

[[mounts]]
  source = 'data'
  destination = '/data'
  initial_size = '1gb'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '5GB'

[[services]]
  protocol = 'tcp'
  internal_port = 8080
  # Only accept HTTP traffic from Cloudflare proxy IPs.
  # Direct access to the raw IPv6 address is blocked for HTTP.
  allowed_ips = [
    # Cloudflare IPv4
    "173.245.48.0/20", "103.21.244.0/22", "103.22.200.0/22", "103.31.4.0/22",
    "141.101.64.0/18", "108.162.192.0/18", "190.93.240.0/20", "188.114.96.0/20",
    "197.234.240.0/22", "198.41.128.0/17", "162.158.0.0/15", "104.16.0.0/13",
    "104.24.0.0/14", "172.64.0.0/13", "131.0.72.0/22",
    # Cloudflare IPv6
    "2400:cb00::/32", "2606:4700::/32", "2803:f800::/32", "2405:b500::/32",
    "2405:8100::/32", "2a06:98c0::/29", "2c0f:f248::/32"
  ]

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['http', 'tls']

  [[services.http_checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '5s'
    path = '/health'

[[services]]
  protocol = 'tcp'
  internal_port = 8042

  [[services.ports]]
    port = 8042
    internal_port = 8042

  [[services.tcp_checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '5s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
